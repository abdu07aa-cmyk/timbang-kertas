<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Simulasi 83 Jalur Interaktif</title>
<style>
  body { font-family: Arial, sans-serif; background: #fff; margin: 20px; }
  h1 { text-align: center; }
  svg { border: 1px solid #ccc; display: block; margin: 20px auto; }
  .node { stroke: black; stroke-width: 2; }
  .start { fill: green; }
  .end { fill: red; }
  .stop { fill: black; }
  .route { fill: none; stroke-width: 2; opacity: 0.5; cursor: pointer; transition: opacity 0.2s; }
  .route:hover { opacity: 1; stroke-width: 3; }
  .label { font-size: 10px; text-anchor: middle; }
  #info { text-align: center; margin-top: 10px; font-weight: bold; }
</style>
</head>
<body>

<h1>Simulasi 83 Jalur Interaktif</h1>
<div id="info">Hover atau klik jalur untuk info</div>

<svg width="1000" height="700" id="svgCanvas"></svg>

<script>
const nodes = {
  "A": [100, 350],
  "B": [900, 350],
  "C1": [250, 150], "C2": [250, 250], "C3": [250, 350], "C4": [250, 450], "C5": [250, 550],
  "C6": [500, 150], "C7": [500, 250], "C8": [500, 350], "C9": [500, 450], "C10": [500, 550],
  "C11": [700, 150], "C12": [700, 250], "C13": [700, 350], "C14": [700, 450], "C15": [700, 550]
};

const svg = document.getElementById("svgCanvas");

// Tambahkan node ke SVG
for (const [name, [x,y]] of Object.entries(nodes)) {
  const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
  circle.setAttribute("cx", x);
  circle.setAttribute("cy", y);
  circle.setAttribute("r", 10);
  circle.setAttribute("class", "node " + (name=="A"?"start": name=="B"?"end":"stop"));
  svg.appendChild(circle);

  const text = document.createElementNS("http://www.w3.org/2000/svg","text");
  text.setAttribute("x", x);
  text.setAttribute("y", y-10);
  text.setAttribute("class","label");
  text.textContent = name;
  svg.appendChild(text);
}

// Generate 83 jalur acak
const stops = Object.keys(nodes).filter(n=>n!=="A" && n!=="B");
const colors = ["blue","red","green","orange","purple","#888","#666","#444","#222","#555"];
const routes = [];

for (let i=0;i<83;i++){
  const pathNodes = ["A"];
  const len = Math.floor(Math.random()*3)+3; // 3-5 titik per jalur
  for(let j=0;j<len;j++){
    pathNodes.push(stops[Math.floor(Math.random()*stops.length)]);
  }
  pathNodes.push("B");
  routes.push(pathNodes);
}

// Tambahkan jalur ke SVG
routes.forEach((pathNodes, idx)=>{
  const path = document.createElementNS("http://www.w3.org/2000/svg","path");
  const d = "M"+pathNodes.map(n=>nodes[n].join(",")).join(" L");
  path.setAttribute("d", d);
  path.setAttribute("stroke", colors[idx % colors.length]);
  path.setAttribute("class","route");
  path.addEventListener("mouseover", ()=>{document.getElementById("info").textContent = pathNodes.join(" → ");});
  path.addEventListener("mouseout", ()=>{document.getElementById("info").textContent = "Hover atau klik jalur untuk info";});
  path.addEventListener("click", ()=>{ 
    document.querySelectorAll(".route").forEach(r=>r.setAttribute("opacity",0.5));
    path.setAttribute("opacity",1);
    path.setAttribute("stroke-width",4);
    document.getElementById("info").textContent = "Dipilih: "+pathNodes.join(" → ");
  });
  svg.appendChild(path);
});
</script>

</body>
</html>
