<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aplikasi Timbangan Kertas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #e0e7ff; font-family: Arial, sans-serif; padding: 12px; }
        .container { max-width: 550px; margin: 0 auto; }
        .card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 1.3rem; color: #1e3a8a; text-align: center; }
        .tab-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab { flex: 1; text-align: center; padding: 10px; background: #cbd5e1; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .tab.active { background: #1e3a8a; color: white; }
        .page { display: none; }
        .page.active-page { display: block; }
        label { font-weight: bold; display: block; margin-top: 12px; margin-bottom: 5px; font-size: 0.85rem; }
        input, select { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #ccc; }
        button { background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 40px; width: 100%; margin-top: 16px; cursor: pointer; font-weight: bold; }
        .btn-hapus { background: #ef4444; margin-top: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th, td { border: 1px solid #ccc; padding: 6px; text-align: left; }
        th { background: #e2e8f0; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 12px; flex-wrap: wrap; }
        .pagination button { width: auto; padding: 5px 10px; margin-top: 0; background: #e2e8f0; color: black; }
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .search-row input { flex: 2; margin-top: 0; }
        .search-row button { flex: 1; margin-top: 0; background: #8b5cf6; }
        .note { background: #dbeafe; padding: 8px; border-radius: 12px; font-size: 0.7rem; margin-bottom: 12px; }
        .row-2 { display: flex; gap: 12px; }
        .row-2 > div { flex: 1; }
        .berat-bersih { font-size: 1.2rem; font-weight: bold; color: #1e3a8a; }
    </style>
</head>
<body>
<div class="container">
    <div class="tab-bar">
        <div class="tab active" data-page="page1">📦 Timbang</div>
        <div class="tab" data-page="page2">📜 Riwayat</div>
    </div>

    <!-- HALAMAN 1: TIMBANG -->
    <div id="page1" class="page active-page">
        <div class="card">
            <h1>📦 TIMBANG 1 BOX KERTAS</h1>
            <div class="note">✅ Bundles dibulatkan KE ATAS | Data tersimpan di HP (Local Storage)</div>

            <label>📅 Tanggal (MM/DD/YYYY)</label>
            <input type="text" id="tanggal" value="04/22/2026">

            <label>📄 No. PO</label>
            <input type="text" id="noPo" placeholder="PO-001">

            <label>🏷️ Brand</label>
            <input type="text" id="brand" placeholder="Sinar Dunia">

            <label>📏 Size Kertas</label>
            <select id="size">
                <option value="SINGLE 36X69">SINGLE 36X69</option>
                <option value="1 1/4 44X78">1 1/4 44X78</option>
                <option value="KS 54X97">KS 54X97</option>
                <option value="KSS 44X108">KSS 44X108</option>
                <option value="KSS SLIM 36X108">KSS SLIM 36X108</option>
                <option value="SKS 54X108">SKS 54X108</option>
            </select>

            <div class="row-2">
                <div><label>📄 GSM</label><select id="gsm"><option value="13">13</option><option value="14">14</option><option value="20">20</option><option value="35">35</option></select></div>
                <div><label>📑 Leaves/Bundle</label><select id="leaves"><option value="32">32</option><option value="33">33</option><option value="40">40</option><option value="50">50</option><option value="60">60</option></select></div>
            </div>

            <div class="row-2">
                <div><label>📦 Jenis Box</label><select id="box"><option value="White">White (0.90 kg)</option><option value="White New">White New (0.80 kg)</option><option value="Grey">Grey (1.25 kg)</option><option value="Green Jumbo">Green Jumbo (3.80 kg)</option></select></div>
                <div><label>📚 Jumlah Layer</label><input type="number" id="layer" step="1" value="0"></div>
            </div>

            <label>⚖️ Berat TIMBANG 1 BOX (kg)</label>
            <input type="number" id="berat" step="0.01" placeholder="Contoh: 2.50">

            <button id="hitungBtn">✅ HITUNG & SIMPAN</button>
        </div>

        <div class="card" id="hasilCard" style="display:none">
            <h2>📊 HASIL PERHITUNGAN</h2>
            <div style="padding:12px; background:#f1f5f9; border-radius:12px">
                <div><strong>⚖️ Berat Bersih Kertas:</strong> <span id="beratBersih" class="berat-bersih">0</span> kg</div>
                <div style="margin-top:10px"><strong>📦 JUMLAH BUNDLES:</strong> <span id="jumlahBundles" style="font-size:1.8rem; color:#1e3a8a; font-weight:bold">0</span> bundle</div>
            </div>
        </div>
    </div>

    <!-- HALAMAN 2: RIWAYAT -->
    <div id="page2" class="page">
        <div class="card">
            <h2>📜 RIWAYAT TIMBANG</h2>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Cari No. PO atau Brand...">
                <button id="cariBtn">🔍 Cari</button>
            </div>
            <button id="resetCariBtn" style="background:#64748b; margin-top:0;">↺ Reset</button>

            <div style="overflow-x:auto; margin-top:12px">
                <table id="riwayatTable">
                    <thead>
                        <tr><th>No</th><th>Tgl</th><th>PO</th><th>Brand</th><th>Size</th><th>GSM</th><th>Box</th><th>Bundles</th></tr>
                    </thead>
                    <tbody id="riwayatBody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
            <button id="hapusSemuaBtn" class="btn-hapus">🗑️ Hapus Semua Data</button>
        </div>
    </div>
</div>

<script>
    // ==================== DATABASE BERAT 1 BUNDLE (GRAM dari data Anda) ====================
    const beratBundleDB = {
        "SINGLE 36X69|13|32":1.03, "SINGLE 36X69|13|33":1.07, "SINGLE 36X69|13|40":1.29, "SINGLE 36X69|13|50":1.61,
        "SINGLE 36X69|14|32":1.11, "SINGLE 36X69|14|33":1.15, "SINGLE 36X69|14|40":1.39, "SINGLE 36X69|14|50":1.74,
        "1 1/4 44X78|13|32":1.43, "1 1/4 44X78|13|33":1.47, "1 1/4 44X78|13|40":1.78, "1 1/4 44X78|13|50":2.23,
        "1 1/4 44X78|14|32":1.54, "1 1/4 44X78|14|33":1.59, "1 1/4 44X78|14|40":1.92, "1 1/4 44X78|14|50":2.40,
        "KS 54X97|14|32":2.35, "KS 54X97|14|33":2.42, "KS 54X97|14|40":2.93, "KS 54X97|14|50":3.67,
        "KS 54X97|20|32":3.35, "KS 54X97|20|33":3.46, "KS 54X97|20|40":4.19, "KS 54X97|20|50":5.24,
        "KSS 44X108|13|32":1.98, "KSS 44X108|13|33":2.04, "KSS 44X108|13|40":2.47, "KSS 44X108|13|50":3.09,
        "KSS 44X108|14|33":2.20, "KSS 44X108|14|40":2.66, "KSS 44X108|14|50":3.33,
        "KSS SLIM 36X108|14|32":1.74, "KSS SLIM 36X108|14|33":1.80, "KSS SLIM 36X108|14|40":2.18, "KSS SLIM 36X108|14|50":2.72,
        "SKS 54X108|13|33":2.50, "SKS 54X108|13|40":3.03, "SKS 54X108|13|50":3.79,
        "SKS 54X108|14|33":2.69, "SKS 54X108|14|40":3.27, "SKS 54X108|14|50":4.08
    };

    const beratBoxMap = { "White":0.90, "White New":0.80, "Grey":1.25, "Green Jumbo":3.80 };
    const BERAT_LAYER_KG = 0.00618;

    // Data riwayat
    let dataRiwayat = [];
    let currentPage = 1;
    let currentSearch = "";
    const rowsPerPage = 10;

    // Load data dari Local Storage
    function loadData() {
        const saved = localStorage.getItem('timbangan_kertas');
        if(saved) {
            dataRiwayat = JSON.parse(saved);
        } else {
            dataRiwayat = [];
        }
    }

    // Simpan ke Local Storage
    function saveData() {
        localStorage.setItem('timbangan_kertas', JSON.stringify(dataRiwayat));
    }

    // Ambil berat 1 bundle dalam KG
    function getBeratBundleKG() {
        const size = document.getElementById('size').value;
        const gsm = document.getElementById('gsm').value;
        const leaves = document.getElementById('leaves').value;
        const key = `${size}|${gsm}|${leaves}`;
        const gram = beratBundleDB[key];
        if(!gram) return null;
        return gram / 1000;
    }

    // Hitung dan simpan
    document.getElementById('hitungBtn').onclick = () => {
        // Ambil input
        const beratTimbang = parseFloat(document.getElementById('berat').value);
        if(isNaN(beratTimbang) || beratTimbang <= 0) {
            alert("Masukkan berat timbang yang benar!");
            return;
        }

        const boxType = document.getElementById('box').value;
        const beratBox = beratBoxMap[boxType];
        const jumlahLayer = parseInt(document.getElementById('layer').value) || 0;
        const beratLayer = jumlahLayer * BERAT_LAYER_KG;
        const beratBersih = beratTimbang - beratBox - beratLayer;

        if(beratBersih <= 0) {
            alert("Berat bersih negatif! Cek timbangan, box, dan layer.");
            return;
        }

        const beratBundleKG = getBeratBundleKG();
        if(!beratBundleKG) {
            alert("Data kombinasi Size/GSM/Leaves tidak ditemukan!");
            return;
        }

        const bundlesDesimal = beratBersih / beratBundleKG;
        const bundlesBulat = Math.ceil(bundlesDesimal);

        // Tampilkan hasil
        document.getElementById('beratBersih').innerHTML = beratBersih.toFixed(4);
        document.getElementById('jumlahBundles').innerHTML = bundlesBulat;
        document.getElementById('hasilCard').style.display = "block";

        // Simpan ke riwayat
        const newData = {
            id: Date.now(),
            tanggal: document.getElementById('tanggal').value,
            noPo: document.getElementById('noPo').value || "-",
            brand: document.getElementById('brand').value || "-",
            size: document.getElementById('size').value,
            gsm: document.getElementById('gsm').value,
            box: boxType,
            bundles: bundlesBulat
        };

        dataRiwayat.unshift(newData);
        saveData();

        // Reset form
        document.getElementById('berat').value = '';
        document.getElementById('noPo').value = '';
        document.getElementById('brand').value = '';

        // Refresh tabel
        currentPage = 1;
        currentSearch = "";
        document.getElementById('searchInput').value = "";
        tampilkanRiwayat();

        alert("Data berhasil disimpan!");
    };

    // Tampilkan riwayat
    function tampilkanRiwayat() {
        let filtered = dataRiwayat;
        if(currentSearch) {
            const searchLower = currentSearch.toLowerCase();
            filtered = dataRiwayat.filter(item => 
                item.noPo.toLowerCase().includes(searchLower) || 
                item.brand.toLowerCase().includes(searchLower)
            );
        }

        const totalPages = Math.ceil(filtered.length / rowsPerPage);
        const start = (currentPage - 1) * rowsPerPage;
        const pageData = filtered.slice(start, start + rowsPerPage);

        const tbody = document.getElementById('riwayatBody');
        if(pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">📭 Tidak ada data</td></tr>';
        } else {
            tbody.innerHTML = "";
            for(let i = 0; i < pageData.length; i++) {
                const d = pageData[i];
                tbody.innerHTML += `<tr>
                    <td style="text-align:center">${start + i + 1}</td>
                    <td>${d.tanggal}</td>
                    <td>${d.noPo}</td>
                    <td>${d.brand}</td>
                    <td>${d.size.substring(0,8)}</td>
                    <td>${d.gsm}</td>
                    <td>${d.box}</td>
                    <td style="text-align:center; font-weight:bold">${d.bundles}</td>
                </tr>`;
            }
        }

        // Pagination
        let pagHtml = '';
        for(let i = 1; i <= totalPages; i++) {
            pagHtml += `<button onclick="goToPage(${i})" class="${i === currentPage ? 'active-page-btn' : ''}">${i}</button>`;
        }
        document.getElementById('pagination').innerHTML = pagHtml;
    }

    window.goToPage = (p) => {
        currentPage = p;
        tampilkanRiwayat();
    };

    // Pencarian
    document.getElementById('cariBtn').onclick = () => {
        currentSearch = document.getElementById('searchInput').value.trim();
        currentPage = 1;
        tampilkanRiwayat();
    };

    document.getElementById('resetCariBtn').onclick = () => {
        currentSearch = '';
        document.getElementById('searchInput').value = '';
        currentPage = 1;
        tampilkanRiwayat();
    };

    // Hapus semua
    document.getElementById('hapusSemuaBtn').onclick = () => {
        if(confirm("⚠️ Hapus SEMUA data riwayat? Tindakan ini tidak bisa dibatalkan!")) {
            dataRiwayat = [];
            saveData();
            currentPage = 1;
            currentSearch = "";
            document.getElementById('searchInput').value = "";
            tampilkanRiwayat();
            alert("Semua data telah dihapus!");
        }
    };

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(tab.dataset.page).classList.add('active-page');
            if(tab.dataset.page === 'page2') {
                tampilkanRiwayat();
            }
        };
    });

    // Inisialisasi
    loadData();
    tampilkanRiwayat();
</script>
</body>
</html>
